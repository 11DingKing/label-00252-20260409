version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: microgrid-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: microgrid
      MYSQL_USER: microgrid
      MYSQL_PASSWORD: microgrid123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microgrid-network

  redis:
    image: redis:7-alpine
    container_name: microgrid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microgrid-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: microgrid-backend
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=microgrid
      - DB_PASSWORD=microgrid123
      - DB_NAME=microgrid
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - microgrid-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: microgrid-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - microgrid-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  microgrid-network:
    driver: bridge
